#系统管理模块-syssvr
Name: sys.rpc
ListenOn: localhost:9180
CpuThreshold: 0
Etcd:
  Hosts:
    - localhost:2379
  Key: sys.rpc
Database:
  DBType: mysql
  DSN: root:password@tcp(localhost:3306)/iThings?charset=utf8mb4&collation=utf8mb4_bin&parseTime=true&loc=Asia%2FShanghai
CacheRedis:
  - Host: localhost:6379
    Pass:
    Type: node
Event:
  
  Nats:
    Url: nats://localhost:4222
    Consumer: dmsvr
UserToken:
  AccessSecret: ad879037-c7a4-4063-9236-6bfc35d54b7d
  AccessExpire: 360000000 #有效期为一小时
UserOpt:
  NeedUserName: true
  NeedPassWord: true
  PassLevel: 2
ThirdJwtSecret: Xk9mQ2vR7pLw4nBz8jYf
Map:
  Mode: baidu
  AccessKey: UGmGEIzlEQWtRjC1uGb6f0oypHPQC3Bs
GoogleJWKS:
  URL:
  HeaderName: X-YKHL-JWKS-TOKEN
  AccessToken:
TimedJobRpc:
  Enable: true
  Mode: direct
  RunProxy: true
  Conf:
    Timeout: 1000000
# uni-push 2.0（配置方式同 ThirdJwtSecret：Secret 写在 sys.yaml，可选 env YK_PUSH_HTTP_SECRET 覆盖）
UniPush:
  Enabled: false
  AppId: __UNI__F82AD01
  HttpUrl: https://env-00jxufuad0x3.dev-hz.cloudbasefunction.cn/yk-push-send
  Secret: ""
  TimeoutMs: 5000
  ForceNotification: true
  NotifyCodes:
    - ruleDeviceAlarm
    - ruleScene
  PushOnMessage: true  # 兼容：message 旁路 uni-push；新场景请用 systemNotice
TimedSchedulerRpc:
  Enable: true
  Mode: direct
  RunProxy: true
  Conf:
    Timeout: 1000000
