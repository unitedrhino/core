# commonLocal.yaml 是 AI/本机联调用的本地覆盖配置。
Host: 0.0.0.0
CpuThreshold: 0
Timeout: 1000000
MaxBytes: 1000000000
Log:
  Encoding: plain
CacheRedis:
  - Host: 127.0.0.1:6379
    Pass:
    Type: node
Middlewares:
  Prometheus: false
Database:
  DBType: mysql
  DSN: ${CORE_DB_DSN}
SysRpc:
  Enable: true
  Mode: direct
  RunProxy: true
  Conf:
    Timeout: 1000000
TimedJobRpc:
  Enable: false
  Mode: direct
  RunProxy: false
  Conf:
    Timeout: 1000000
TimedSchedulerRpc:
  Enable: false
  Mode: direct
  RunProxy: false
  Conf:
    Timeout: 1000000
Event:
  Nats:
    Url: nats://127.0.0.1:4222
OssConf:
  OssType: local
  PublicBucketName: ithings-public
  PrivateBucketName: ithings-private
  TemporaryBucketName: ithings-temporary
  StorePath: ./oss
  ConnectTimeout: 6000
  ReadWriteTimeout: 60000
DevServer:
  Enabled: true
  Port: 7061
